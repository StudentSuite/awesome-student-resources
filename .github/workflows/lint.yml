name: Lint

on:
  pull_request:
    paths:
      - README.md
      - scripts/check-list-format.mjs
  push:
    branches:
      - main
    paths:
      - README.md
      - scripts/check-list-format.mjs

jobs:
  check-list-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/check-list-format.mjs
